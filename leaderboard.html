<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Admin APECS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ===== APECS Admin — shared design tokens & shell =====
   This block is intentionally duplicated in every page's CSS file
   so each page remains fully self-contained and independently editable. */

:root{
  --ink:#10132A;
  --ink-soft:#1B1F3B;
  --line:#E5E7F0;
  --line-soft:#EEF0F7;
  --paper:#F5F6FA;
  --card:#FFFFFF;
  --text:#1C1F33;
  --text-dim:#6B7089;
  --text-faint:#9296AC;
  --accent:#4F46E5;
  --accent-soft:#EEEDFD;
  --accent-ink:#3730A3;
  --good:#16A34A;
  --good-soft:#E9F9EF;
  --warn:#D97706;
  --warn-soft:#FEF3E2;
  --bad:#DC2626;
  --bad-soft:#FDEDED;
  --sidebar-w:230px;
  --radius:10px;
  --radius-lg:14px;
  --shadow:0 1px 2px rgba(16,19,42,0.04), 0 8px 24px -12px rgba(16,19,42,0.12);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
ul{list-style:none;}

/* ---- App shell ---- */
.app-shell{display:flex;min-height:100vh;}

.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--ink);
  color:#C7C9E8;
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;left:0;bottom:0;
  z-index:40;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:22px 20px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#8B7BFF);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:13px;color:#fff;
  flex-shrink:0;
}
.brand-text{line-height:1.15;}
.brand-text .t1{font-weight:700;font-size:14.5px;color:#fff;letter-spacing:.2px;}
.brand-text .t2{font-size:11px;color:#8489B5;font-family:'JetBrains Mono',monospace;letter-spacing:.4px;}

.status-pill{
  margin:14px 20px 0;
  display:flex;align-items:center;gap:7px;
  font-size:11px;color:#8489B5;
  font-family:'JetBrains Mono',monospace;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--good);
  box-shadow:0 0 0 3px rgba(22,163,74,0.2);
}
.status-dot.off{background:var(--bad);box-shadow:0 0 0 3px rgba(220,38,38,0.2);}

.nav{padding:18px 12px;flex:1;display:flex;flex-direction:column;gap:2px;}
.nav a{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:8px;
  font-size:13.5px;font-weight:500;color:#AEB2D6;
  transition:background .15s ease,color .15s ease;
}
.nav a svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav a:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav a.active{background:var(--accent);color:#fff;}
.nav a.active svg{opacity:1;}

.sidebar-foot{padding:14px 12px 18px;border-top:1px solid rgba(255,255,255,0.08);}
.logout-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
  background:transparent;color:#C7C9E8;font-size:13px;font-weight:600;
  transition:all .15s ease;
}
.logout-btn:hover{background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.4);color:#FCA5A5;}

.main{
  margin-left:var(--sidebar-w);
  flex:1;
  min-width:0;
  padding:28px 34px 60px;
}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:26px;flex-wrap:wrap;gap:14px;
}
.topbar h1{font-size:21px;font-weight:700;letter-spacing:-.2px;}
.topbar .sub{font-size:13px;color:var(--text-dim);margin-top:3px;}

/* ---- Cards / tables ---- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card-pad{padding:20px 22px;}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--line-soft);
  flex-wrap:wrap;gap:10px;
}
.card-head h2{font-size:15px;font-weight:700;}
.card-head .count{font-size:12px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  text-align:left;padding:12px 22px;font-size:11px;font-weight:700;
  color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--line);white-space:nowrap;
}
tbody td{padding:13px 22px;border-bottom:1px solid var(--line-soft);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--paper);}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
}
.badge.good{background:var(--good-soft);color:var(--good);}
.badge.bad{background:var(--bad-soft);color:var(--bad);}
.badge.warn{background:var(--warn-soft);color:var(--warn);}
.badge.neutral{background:var(--accent-soft);color:var(--accent-ink);}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;border:1px solid var(--line);
  background:var(--card);font-size:12.5px;font-weight:600;color:var(--text);
  transition:all .15s ease;
}
.btn:hover{border-color:var(--accent);color:var(--accent-ink);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:var(--accent-ink);}
.btn.sm{padding:6px 11px;font-size:12px;}

.search-box{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--line);border-radius:8px;
  padding:8px 12px;background:var(--card);min-width:220px;
}
.search-box svg{width:15px;height:15px;color:var(--text-faint);flex-shrink:0;}
.search-box input{border:none;outline:none;font-size:13px;width:100%;background:transparent;}

.empty-state,.loading-state{
  padding:50px 20px;text-align:center;color:var(--text-faint);font-size:13px;
}
.loading-state .spin{
  width:22px;height:22px;border-radius:50%;
  border:2.5px solid var(--line);border-top-color:var(--accent);
  margin:0 auto 12px;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{
  position:fixed;bottom:22px;right:22px;z-index:100;
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:9px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:9px;
  transform:translateY(12px);opacity:0;pointer-events:none;
  transition:all .25s ease;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:var(--bad);}

/* ---- Mobile ---- */
html{-webkit-text-size-adjust:100%;}
body{overflow-x:hidden;}
.menu-toggle{display:none;}
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(16,19,42,0.45);z-index:35;
  opacity:0;transition:opacity .2s ease;
}
.sidebar-overlay.show{display:block;opacity:1;}

@media (max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .2s ease;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:18px 16px 50px;}
  .menu-toggle{
    display:flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);flex-shrink:0;
  }
  .topbar{align-items:flex-start;gap:12px;}
  .topbar h1{font-size:19px;}

  .card-head{flex-direction:column;align-items:stretch;gap:12px;}
  .head-actions{width:100%;flex-direction:column;align-items:stretch;gap:10px;}
  .search-box{width:100%;min-width:0;}

  table{font-size:12.5px;}
  thead th{padding:10px 14px;}
  tbody td{padding:11px 14px;}
  .table-wrap{-webkit-overflow-scrolling:touch;}

  .card-pad{padding:16px 18px;}
}

@media (max-width:480px){
  .main{padding:14px 12px 44px;}
  .brand{padding:18px 16px 14px;}
  .nav{padding:14px 10px;}
  .topbar h1{font-size:17px;}
  .topbar .sub{font-size:12px;}
  .btn{padding:9px 12px;font-size:12.5px;}
  table{font-size:12px;}
  thead th{padding:9px 12px;font-size:10.5px;}
  tbody td{padding:10px 12px;}
}

/* ---- Leaderboard page specific ---- */
.hidden{display:none !important;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;font-weight:600;color:var(--text-dim);
  margin-bottom:16px;
}
.back-link:hover{color:var(--accent-ink);}
.head-actions{display:flex;align-items:center;gap:14px;}
.rank-cell{display:flex;align-items:center;gap:7px;font-weight:700;}
.rank-cell .medal{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-family:'JetBrains Mono',monospace;}
.medal.gold{background:#D4A017;}
.medal.silver{background:#9CA3AF;}
.medal.bronze{background:#B45309;}

/* ---- Hide the shell until the admin check passes, so a JS error
       or slow network never leaves protected data visible. ---- */
.app-shell{opacity:0;pointer-events:none;transition:opacity .18s ease;}
.app-shell.ready{opacity:1;pointer-events:auto;}

/* ---- Mobile backdrop (shown behind the sidebar when it's open) ---- */
.sidebar-backdrop{display:none;}
@media (max-width:900px){
  .sidebar-backdrop.show{
    display:block;position:fixed;inset:0;
    background:rgba(10,12,30,0.45);
    z-index:35;
  }
}

/* ---- Finer mobile layout tuning ---- */
@media (max-width:600px){
  .topbar h1{font-size:18px;}
  .topbar .sub{font-size:12px;}
  .card-head{flex-direction:column;align-items:stretch;gap:10px;}
  .card-head .head-actions{flex-direction:column;align-items:stretch;width:100%;gap:8px;}
  .search-box{width:100%;min-width:0;}
  .card-pad{padding:16px;}
  thead th{padding:10px 14px;font-size:10px;}
  tbody td{padding:11px 14px;font-size:12.5px;}
  .btn{padding:9px 13px;}
  .btn.sm{padding:8px 12px;}
  .stat-grid{grid-template-columns:1fr 1fr;gap:12px;}
  .stat-card{padding:14px 16px;}
  .stat-value{font-size:21px;}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .tab-btn{white-space:nowrap;}
  .profile-header{padding:18px 16px;gap:14px;}
  .avatar{width:52px;height:52px;font-size:18px;}
  .info-item{padding:13px 16px;}
  .perf-grid{grid-template-columns:1fr 1fr;gap:10px;}
}
@media (max-width:400px){
  .stat-grid{grid-template-columns:1fr;}
  .perf-grid{grid-template-columns:1fr;}
}

</style>
</head>

<script>
(function () {
"use strict";

if (window.__apecs_leaderboard_loaded) return; // guard: never re-run this page's script twice
window.__apecs_leaderboard_loaded = true;

/* ===== APECS Admin — Leaderboard page logic (self-contained) =====
   Supabase project + anon key are declared directly in this file
   so this page works completely on its own. */

const SUPABASE_URL = "https://bhmycvrbucmbbrpzeane.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobXljdnJidWNtYmJycHplYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2OTQwOTYsImV4cCI6MjA4MDI3MDA5Nn0.qQ3bw9cADG0P8hbGwx76Oeg54l-9FbRWxc92nZdSPL4";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---- shell wiring: active nav link, mobile menu, logout, toast ---- */

document.querySelectorAll(".nav a").forEach((link) => {
  if (link.getAttribute("data-nav") === document.body.dataset.page) link.classList.add("active");
});

const menuToggle = document.getElementById("menu-toggle");
const sidebar = document.getElementById("sidebar");
const sidebarBackdrop = document.getElementById("sidebar-backdrop");

function openSidebar() {
  sidebar.classList.add("open");
  sidebarBackdrop?.classList.add("show");
}
function closeSidebar() {
  sidebar.classList.remove("open");
  sidebarBackdrop?.classList.remove("show");
}
if (menuToggle) {
  menuToggle.addEventListener("click", () => {
    sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
  });
}
sidebarBackdrop?.addEventListener("click", closeSidebar);
document.querySelectorAll(".nav a").forEach((link) => link.addEventListener("click", closeSidebar));

const logoutBtn = document.getElementById("logout-btn");
if (logoutBtn) {
  logoutBtn.addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "login.html";
  });
}

const toastEl = document.getElementById("toast");
function showToast(message, isError = false) {
  if (!toastEl) return;
  toastEl.textContent = message;
  toastEl.classList.toggle("error", isError);
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 3200);
}

/* ---- auth guard: only active admins may view this page ---- */

async function requireAdmin() {
  try {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (sessionError) throw sessionError;

    if (!session) {
      window.location.href = "login.html";
      return null;
    }

    const { data: adminRow, error } = await supabase
      .from("apecs_admins")
      .select("admin_id, is_active")
      .eq("user_id", session.user.id)
      .eq("is_active", true)
      .maybeSingle();

    if (error) throw error;

    if (!adminRow) {
      await supabase.auth.signOut();
      window.location.href = "login.html";
      return null;
    }

    document.getElementById("status-dot")?.classList.remove("off");
    const statusText = document.getElementById("status-text");
    if (statusText) statusText.textContent = "Connected";
    document.getElementById("app-shell")?.classList.add("ready");

    return session;
  } catch (err) {
    // Never let an unexpected error leave the page silently blank.
    document.getElementById("app-shell")?.classList.add("ready");
    document.getElementById("status-dot")?.classList.add("off");
    const statusText = document.getElementById("status-text");
    if (statusText) statusText.textContent = "Connection error";
    showToast(err.message || "Could not verify admin access. Check your connection and refresh.", true);
    return null;
  }
}

/* ---- page data ---- */

let allRows = [];

function medalFor(index) {
  if (index === 0) return `<span class="medal gold">1</span>`;
  if (index === 1) return `<span class="medal silver">2</span>`;
  if (index === 2) return `<span class="medal bronze">3</span>`;
  return "";
}

function formatSeconds(sec) {
  if (sec == null) return "—";
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}m ${s}s`;
}

function renderRows(rows) {
  const tbody = document.getElementById("lb-body");
  document.getElementById("lb-count").textContent = `${rows.length} entr${rows.length === 1 ? "y" : "ies"}`;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">No leaderboard entries match your search.</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((row, i) => `
    <tr>
      <td><span class="rank-cell">${medalFor(i)}<span class="mono">#${row.rank_position ?? i + 1}</span></span></td>
      <td>${row.display_name ?? "—"}</td>
      <td>${row.chapter_code ?? "—"}</td>
      <td class="mono">${row.score}</td>
      <td class="mono">${row.percentage?.toFixed?.(1) ?? row.percentage}%</td>
      <td class="mono">${row.correct_answers} / ${row.wrong_answers}</td>
      <td class="mono">${formatSeconds(row.total_time_seconds)}</td>
      <td>
        ${row.user_id ? `<a class="btn sm" href="view-profile.html?user_id=${encodeURIComponent(row.user_id)}">View Profile</a>` : ""}
      </td>
    </tr>
  `).join("");
}

async function loadLeaderboard() {
  const params = new URLSearchParams(window.location.search);
  const quizId = params.get("quiz_id");

  if (quizId) {
    document.getElementById("lb-back-link").classList.remove("hidden");
    document.getElementById("lb-title").textContent = "Quiz Leaderboard";
    document.getElementById("lb-subtitle").textContent = `Rankings for quiz: ${quizId}`;

    const { data: quizRow } = await supabase
      .from("apecs_quizzes")
      .select("quiz_name")
      .eq("quiz_id", quizId)
      .maybeSingle();
    if (quizRow?.quiz_name) {
      document.getElementById("lb-title").textContent = `Leaderboard — ${quizRow.quiz_name}`;
    }
  }

  let query = supabase
    .from("apecs_leaderboard")
    .select("*", { count: "exact" })
    .order("score", { ascending: false })
    .order("total_time_seconds", { ascending: true });

  if (quizId) query = query.eq("quiz_id", quizId);

  const { data, error, count } = await query;

  if (error) {
    document.getElementById("lb-body").innerHTML =
      `<tr><td colspan="8"><div class="empty-state">Could not load leaderboard: ${error.message}</div></td></tr>`;
    showToast(`Leaderboard error: ${error.message}`, true);
    console.error("apecs_leaderboard query failed:", error);
    return;
  }

  console.info(`apecs_leaderboard returned ${data ? data.length : 0} row(s)` + (quizId ? ` for quiz_id=${quizId}` : " (overall)") + (typeof count === "number" ? ` — table-wide match count: ${count}` : ""));

  let rows = data || [];

  // Pull full names from apecs_profiles instead of relying on apecs_leaderboard.user_name.
  const userIds = [...new Set(rows.map((r) => r.user_id).filter(Boolean))];
  let profileMap = new Map();

  if (userIds.length > 0) {
    const { data: profiles, error: profileError } = await supabase
      .from("apecs_profiles")
      .select("user_id, full_name, first_name, surname")
      .in("user_id", userIds);

    if (profileError) {
      console.error("apecs_profiles lookup failed:", profileError);
    } else {
      profileMap = new Map((profiles || []).map((p) => [p.user_id, p]));
    }
  }

  rows = rows.map((r) => {
    const p = profileMap.get(r.user_id);
    const fullName = p ? (p.full_name || `${p.first_name ?? ""} ${p.surname ?? ""}`.trim()) : null;
    return { ...r, display_name: fullName || r.user_name || "Unknown student" };
  });

  allRows = rows;

  if (allRows.length === 0) {
    document.getElementById("lb-body").innerHTML =
      `<tr><td colspan="8"><div class="empty-state">${quizId ? "No leaderboard entries for this quiz yet." : "No leaderboard entries yet. Entries appear here once students complete quiz attempts."}</div></td></tr>`;
    document.getElementById("lb-count").textContent = "0 entries";
    return;
  }

  renderRows(allRows);
}

document.getElementById("search-input").addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    renderRows(allRows);
    return;
  }
  renderRows(allRows.filter((r) => (r.display_name || "").toLowerCase().includes(q)));
});

(async function init() {
  const session = await requireAdmin();
  if (!session) return;

  try {
    await loadLeaderboard();
  } catch (err) {
    showToast(err.message || "Something went wrong while loading the leaderboard.", true);
  }
})();

})();

</script>
