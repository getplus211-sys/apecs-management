<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — APECS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ===== APECS Admin — Login page styles (self-contained) ===== */

:root{
  --ink:#10132A;
  --ink-soft:#1B1F3B;
  --line:#E5E7F0;
  --paper:#F5F6FA;
  --card:#FFFFFF;
  --text:#1C1F33;
  --text-dim:#6B7089;
  --text-faint:#9296AC;
  --accent:#4F46E5;
  --accent-ink:#3730A3;
  --bad:#DC2626;
  --bad-soft:#FDEDED;
  --radius-lg:16px;
  --shadow:0 1px 2px rgba(16,19,42,0.04), 0 20px 50px -20px rgba(16,19,42,0.35);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(79,70,229,0.35), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(139,123,255,0.25), transparent 40%),
    var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.login-screen{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

.login-panel{
  width:100%;max-width:388px;
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:36px 34px 28px;
}

.brand-block{display:flex;align-items:center;gap:11px;margin-bottom:26px;}
.brand-mark-lg{
  width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),#8B7BFF);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;
  flex-shrink:0;
}
.brand-text-lg .t1{font-weight:800;font-size:16px;color:var(--text);letter-spacing:-.2px;}
.brand-text-lg .t2{font-size:10.5px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:1px;}

h1{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;}
.hint{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:26px;}

.field{display:block;margin-bottom:16px;}
.field span{
  display:block;font-size:12.5px;font-weight:600;color:var(--text);
  margin-bottom:6px;
}
.field input{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
  font-size:14px;font-family:inherit;color:var(--text);
  background:#FBFBFD;transition:border-color .15s ease, box-shadow .15s ease;
}
.field input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(79,70,229,0.14);
  background:#fff;
}

.error-box{
  background:var(--bad-soft);color:var(--bad);
  font-size:12.5px;font-weight:600;
  padding:10px 12px;border-radius:8px;margin-bottom:16px;
  line-height:1.4;
}

.submit-btn{
  width:100%;padding:12px;border:none;border-radius:9px;
  background:var(--accent);color:#fff;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s ease;
  font-family:inherit;
}
.submit-btn:hover{background:var(--accent-ink);}
.submit-btn:disabled{opacity:.7;cursor:not-allowed;}

.btn-spin{
  width:15px;height:15px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.foot-note{
  text-align:center;font-size:11.5px;color:var(--text-faint);
  margin-top:22px;line-height:1.5;
}

</style>
</head>
<body>

<div class="login-screen">
  <div class="login-panel">
    <div class="brand-block">
      <div class="brand-mark-lg">A</div>
      <div class="brand-text-lg">
        <div class="t1">Admin APECS</div>
        <div class="t2">CONTROL PANEL</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="hint">This login is restricted to registered administrators only.</p>

    <form id="login-form" autocomplete="off">
      <label class="field">
        <span>Email</span>
        <input type="email" id="email" name="email" placeholder="admin@example.com" required autocomplete="username">
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </label>

      <div id="error-box" class="error-box" hidden></div>

      <button type="submit" id="submit-btn" class="submit-btn">
        <span class="btn-label">Sign in</span>
        <span class="btn-spin" hidden></span>
      </button>
    </form>

    <p class="foot-note">Access is restricted &amp; monitored. Not an admin? Close this page.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ===== APECS Admin — Login page logic (self-contained) =====
   Supabase project + anon key are declared directly in this file
   so this page works completely on its own. */

const SUPABASE_URL = "https://bhmycvrbucmbbrpzeane.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobXljdnJidWNtYmJycHplYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2OTQwOTYsImV4cCI6MjA4MDI3MDA5Nn0.qQ3bw9cADG0P8hbGwx76Oeg54l-9FbRWxc92nZdSPL4";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("login-form");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const errorBox = document.getElementById("error-box");
const submitBtn = document.getElementById("submit-btn");
const btnLabel = submitBtn.querySelector(".btn-label");
const btnSpin = submitBtn.querySelector(".btn-spin");

function showError(message) {
  errorBox.textContent = message;
  errorBox.hidden = false;
}

function hideError() {
  errorBox.hidden = true;
}

function setLoading(isLoading) {
  submitBtn.disabled = isLoading;
  btnSpin.hidden = !isLoading;
  btnLabel.textContent = isLoading ? "Signing in..." : "Sign in";
}

async function verifyAdminAndRedirect(userId) {
  const { data: adminRow, error: adminError } = await supabase
    .from("apecs_admins")
    .select("admin_id, is_active")
    .eq("user_id", userId)
    .eq("is_active", true)
    .maybeSingle();

  if (adminError || !adminRow) {
    await supabase.auth.signOut();
    showError("This account is not an authorized admin.");
    setLoading(false);
    return;
  }

  window.location.href = "index.html";
}

// If already signed in as a valid admin, skip straight to the dashboard.
(async function checkExistingSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await verifyAdminAndRedirect(session.user.id);
  }
})();

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();
  setLoading(true);

  const email = emailInput.value.trim();
  const password = passwordInput.value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error || !data.session) {
    showError(error ? error.message : "Invalid email or password.");
    setLoading(false);
    return;
  }

  await verifyAdminAndRedirect(data.user.id);
});

</script>
</body>
</html>
